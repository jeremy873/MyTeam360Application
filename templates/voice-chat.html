<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Team 360 — Voice Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--border:#2a2a3a;
  --text:#e8e8f0;--text-dim:#8888a0;--text-muted:#555568;
  --purple:#a459f2;--purple-glow:#a459f244;--purple-dim:#a459f222;
  --blue:#4d8eff;--green:#4ade80;--red:#f87171;--orange:#fb923c;
  --orb-size:200px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── Background atmosphere ── */
.atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none}
.atmosphere::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 50% 40%,var(--purple-dim) 0%,transparent 60%);animation:breathe 8s ease-in-out infinite}
.atmosphere::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(circle at 30% 70%,#4d8eff08 0%,transparent 50%),
  radial-gradient(circle at 70% 20%,#a459f208 0%,transparent 50%)}
@keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

/* ── Layout ── */
.app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.top-bar{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.top-bar .logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--text-dim)}
.top-bar .logo img{height:28px;border-radius:4px}
.top-bar .controls{display:flex;gap:8px}
.btn-icon{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{background:var(--surface2);color:var(--text);border-color:var(--purple)}
.btn-icon.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ── Agent Selector ── */
.agent-selector{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:16px;background:var(--surface);border:1px solid var(--border)}
.agent-selector select{background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;outline:none;cursor:pointer;padding:4px 8px;-webkit-appearance:none;min-width:160px}
.agent-selector select option{background:var(--surface);color:var(--text)}
.agent-voice-label{font-size:11px;color:var(--purple);font-weight:500;padding:3px 8px;border-radius:8px;background:var(--purple-dim)}

/* ── Central Orb ── */
.orb-container{position:relative;width:var(--orb-size);height:var(--orb-size);cursor:pointer;-webkit-tap-highlight-color:transparent}
.orb-container.listening{--orb-size:220px}

.orb-ring{position:absolute;inset:-20px;border-radius:50%;border:1.5px solid var(--purple-glow);
  opacity:0;transition:opacity .4s,transform .4s}
.orb-ring.r2{inset:-40px;animation-delay:.15s}.orb-ring.r3{inset:-60px;animation-delay:.3s}
.listening .orb-ring{opacity:1;animation:ring-pulse 2s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.06);opacity:.6}}

.orb{width:100%;height:100%;border-radius:50%;position:relative;
  background:radial-gradient(circle at 35% 35%,#9f85ff,var(--purple) 50%,#4a35b0 100%);
  box-shadow:0 0 60px var(--purple-glow),0 0 120px #a459f218,inset 0 -20px 40px #0004;
  transition:all .4s cubic-bezier(.25,.46,.45,.94);display:flex;align-items:center;justify-content:center}
.orb::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,#fff3 0%,transparent 50%);pointer-events:none}

/* States */
.idle .orb{transform:scale(.9);opacity:.7;box-shadow:0 0 30px var(--purple-dim)}
.listening .orb{transform:scale(1);box-shadow:0 0 80px var(--purple-glow),0 0 160px #a459f222;
  animation:orb-breathe 1.5s ease-in-out infinite}
.speaking .orb{transform:scale(1.05);
  background:radial-gradient(circle at 35% 35%,#85b8ff,var(--blue) 50%,#3560b0 100%);
  box-shadow:0 0 80px #4d8eff44,0 0 160px #4d8eff18;animation:orb-speak .3s ease-in-out infinite alternate}
.thinking .orb{animation:orb-think 1.2s ease-in-out infinite;
  background:radial-gradient(circle at 35% 35%,#ffb885,var(--orange) 50%,#b06a35 100%);
  box-shadow:0 0 60px #fb923c44}
.error-state .orb{background:radial-gradient(circle at 35% 35%,#ff8585,var(--red) 50%,#b03535 100%);
  box-shadow:0 0 60px #f8717144}

@keyframes orb-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes orb-speak{0%{transform:scale(1.03)}100%{transform:scale(1.07)}}
@keyframes orb-think{0%,100%{transform:scale(.95);opacity:.8}50%{transform:scale(1.02);opacity:1}}

/* Orb icon */
.orb-icon{position:relative;z-index:2;transition:all .3s}
.orb-icon svg{width:48px;height:48px;fill:#fff;filter:drop-shadow(0 2px 8px #0004);transition:all .3s}
.speaking .orb-icon svg{width:40px;height:40px}

/* Audio visualizer bars inside orb */
.viz-bars{position:absolute;display:flex;align-items:center;justify-content:center;gap:3px;z-index:1;opacity:0;transition:opacity .3s}
.listening .viz-bars,.speaking .viz-bars{opacity:1}
.viz-bar{width:3px;border-radius:2px;background:#fff;opacity:.6;transition:height .05s}

/* ── Mic Button ── */
.mic-btn{position:absolute;bottom:-70px;left:50%;transform:translateX(-50%);
  width:56px;height:56px;border-radius:50%;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .3s;z-index:5}
.mic-btn:hover{border-color:var(--purple);transform:translateX(-50%) scale(1.08)}
.mic-btn.active{background:var(--red);border-color:var(--red);box-shadow:0 0 20px #f8717144}
.mic-btn svg{width:22px;height:22px;fill:var(--text-dim);transition:fill .2s}
.mic-btn.active svg{fill:#fff}
.mic-btn .stop-icon{display:none;width:16px;height:16px;border-radius:3px;background:#fff}
.mic-btn.active .mic-icon{display:none}.mic-btn.active .stop-icon{display:block}

/* ── Transcript ── */
.transcript{position:fixed;bottom:0;left:0;right:0;max-height:45vh;overflow-y:auto;
  padding:20px 24px 100px;background:linear-gradient(transparent,var(--bg) 20%);z-index:5}
.transcript-inner{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.msg{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;max-width:85%;
  animation:msg-in .3s ease-out}
.msg.user{align-self:flex-end;background:var(--purple);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant .agent-tag{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:4px}
.msg.partial{opacity:.6;border-style:dashed}
@keyframes msg-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Status line ── */
.status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;
  font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted)}
.listening .status-dot{background:var(--green);animation:pulse-dot 1s infinite}
.speaking .status-dot{background:var(--blue);animation:pulse-dot .5s infinite}
.thinking .status-dot{background:var(--orange);animation:pulse-dot .8s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Settings Panel ── */
.settings-panel{position:fixed;top:0;right:-360px;width:360px;height:100%;z-index:20;
  background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;
  transition:right .3s cubic-bezier(.25,.46,.45,.94)}
.settings-panel.open{right:0}
.settings-panel h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.settings-panel .section{margin-bottom:24px}
.settings-panel label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:6px}
.settings-panel select,.settings-panel input[type=range]{width:100%;padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;outline:none}
.settings-panel select:focus{border-color:var(--purple)}
.settings-panel input[type=range]{-webkit-appearance:none;height:6px;padding:0;border:none;border-radius:3px;cursor:pointer}
.settings-panel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--purple);cursor:pointer}
.settings-panel .close-btn{position:absolute;top:16px;right:16px;cursor:pointer}
.backdrop{position:fixed;inset:0;background:#0008;z-index:15;opacity:0;pointer-events:none;transition:opacity .3s}
.backdrop.show{opacity:1;pointer-events:auto}

/* ── Responsive ── */
@media(max-width:480px){:root{--orb-size:160px}.listening{--orb-size:180px}.transcript{padding:16px 16px 90px}}
</style>
</head>
<body>
<div class="atmosphere"></div>
<div class="app idle" id="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">
      <img src="/api/branding/logo-asset" alt="logo" onerror="this.style.display='none'">
      <span>Voice Chat</span>
    </div>
    <div class="controls">
      <button class="btn-icon" onclick="toggleSettings()" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.6-6.4-1.4 1.4M6 6 4.6 4.6m0 14.8L6 18m12 0 1.4 1.4"/></svg>
      </button>
      <button class="btn-icon" onclick="window.location='/'" title="Back to Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Agent Selector -->
  <div class="agent-selector">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--purple)"><path d="M12 2a5 5 0 015 5v1a5 5 0 01-10 0V7a5 5 0 015-5zm-7 14a7 7 0 0114 0v1H5v-1z"/></svg>
    <select id="agentSelect" onchange="onAgentChange()"></select>
    <span class="agent-voice-label" id="voiceLabel">Browser TTS</span>
  </div>

  <!-- Central Orb -->
  <div class="orb-container" onclick="toggleVoice()">
    <div class="orb-ring r1"></div>
    <div class="orb-ring r2"></div>
    <div class="orb-ring r3"></div>
    <div class="orb">
      <div class="viz-bars" id="vizBars"></div>
      <div class="orb-icon" id="orbIcon">
        <!-- Mic icon (idle) -->
        <svg class="mic-svg" viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9a1 1 0 01-1-1v-2h2v2a1 1 0 01-1 1z"/></svg>
      </div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript" id="transcript">
    <div class="transcript-inner" id="transcriptInner"></div>
  </div>

  <!-- Status -->
  <div class="status" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Tap the orb to start</span>
  </div>
</div>

<!-- Settings Panel -->
<div class="backdrop" id="backdrop" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="btn-icon close-btn" onclick="toggleSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <h3>Voice Settings</h3>

  <div class="section">
    <label>TTS Provider</label>
    <select id="settingsProvider" onchange="onProviderChange()">
      <option value="browser">Browser Native (Free)</option>
    </select>
  </div>

  <div class="section">
    <label>Voice</label>
    <select id="settingsVoice"></select>
  </div>

  <div class="section">
    <label>Speed: <span id="speedLabel">1.0x</span></label>
    <input type="range" id="settingsSpeed" min="0.5" max="2" step="0.05" value="1" oninput="document.getElementById('speedLabel').textContent=this.value+'x'">
  </div>

  <div class="section">
    <label>Language</label>
    <select id="settingsLang">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="es-ES">Spanish</option>
      <option value="fr-FR">French</option>
      <option value="de-DE">German</option>
      <option value="ja-JP">Japanese</option>
      <option value="ko-KR">Korean</option>
      <option value="zh-CN">Chinese (Mandarin)</option>
      <option value="pt-BR">Portuguese (BR)</option>
    </select>
  </div>

  <div class="section">
    <label>Silence Timeout: <span id="silenceLabel">1.5s</span></label>
    <input type="range" id="settingsSilence" min="500" max="4000" step="100" value="1500" oninput="document.getElementById('silenceLabel').textContent=(this.value/1000)+'s'">
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const API = '';
const TOKEN = localStorage.getItem('mt360_token') || new URLSearchParams(location.search).get('token') || '';
const state = {
  mode: 'idle', // idle | listening | thinking | speaking | error
  recognition: null,
  agents: [],
  currentAgent: null,
  conversationId: null,
  sessionId: null,
  audioQueue: [],
  isPlaying: false,
  settings: {},
  providers: [],
  vizBars: [],
  audioCtx: null,
  analyser: null,
  micStream: null,
};

const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` });
const $=id=>document.getElementById(id);
const app=$('app');

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
(async function init() {
  // Create visualizer bars
  const vizContainer = $('vizBars');
  for (let i = 0; i < 24; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    bar.style.height = '4px';
    vizContainer.appendChild(bar);
    state.vizBars.push(bar);
  }

  // Load agents
  try {
    const r = await fetch(`${API}/api/agents`, { headers: headers() });
    const d = await r.json();
    state.agents = d.agents || [];
    const sel = $('agentSelect');
    state.agents.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.icon || '🤖'} ${a.name}`;
      sel.appendChild(opt);
    });
    if (state.agents.length > 0) {
      state.currentAgent = state.agents[0];
      updateVoiceLabel();
    }
  } catch (e) { console.error('Failed to load agents:', e); }

  // Load voice providers
  try {
    const r = await fetch(`${API}/api/voice/providers`, { headers: headers() });
    const d = await r.json();
    state.providers = d.providers || [];
    populateProviderSettings();
  } catch (e) { console.error('Load providers:', e); }

  // Load user voice settings
  try {
    const r = await fetch(`${API}/api/voice/settings`, { headers: headers() });
    state.settings = await r.json();
  } catch (e) { state.settings = {}; }

  // Init speech recognition
  initSpeechRecognition();
})();

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Speech recognition not supported in this browser', 'error'); return; }

  const recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = state.settings.stt_language || 'en-US';

  let silenceTimer = null;
  let finalTranscript = '';

  recognition.onstart = () => { setMode('listening'); finalTranscript = ''; };
  recognition.onend = () => {
    if (state.mode === 'listening') {
      // Auto-restart if we're still supposed to be listening
      try { recognition.start(); } catch (e) {}
    }
  };

  recognition.onresult = (e) => {
    clearTimeout(silenceTimer);
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript + ' ';
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    // Show interim in UI
    updatePartialTranscript(finalTranscript + interim);

    // Auto-send after silence
    const timeout = state.settings.silence_threshold || 1500;
    silenceTimer = setTimeout(() => {
      const text = finalTranscript.trim();
      if (text.length > 2) {
        finalTranscript = '';
        removePartialTranscript();
        sendVoiceMessage(text);
      }
    }, timeout);
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    console.error('STT error:', e.error);
    if (e.error === 'not-allowed') setStatus('Microphone access denied', 'error');
  };

  state.recognition = recognition;
}

// ═══════════════════════════════════════════════════
// VOICE TOGGLE
// ═══════════════════════════════════════════════════
async function toggleVoice() {
  if (state.mode === 'idle' || state.mode === 'error') {
    startListening();
  } else if (state.mode === 'listening') {
    stopListening();
  } else if (state.mode === 'speaking') {
    stopSpeaking();
  }
}

async function startListening() {
  if (!state.recognition) { setStatus('Speech recognition unavailable', 'error'); return; }

  // Start session
  try {
    const r = await fetch(`${API}/api/voice/session/start`, {
      method: 'POST', headers: headers(),
      body: JSON.stringify({ agent_id: state.currentAgent?.id, tts_provider: state.settings.tts_provider || 'browser' })
    });
    const d = await r.json();
    state.sessionId = d.session_id;
  } catch (e) {}

  // Get mic stream for visualization
  try {
    state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 64;
    const source = state.audioCtx.createMediaStreamSource(state.micStream);
    source.connect(state.analyser);
    animateViz();
  } catch (e) { console.warn('Mic visualization unavailable'); }

  state.recognition.lang = state.settings.stt_language || 'en-US';
  state.recognition.start();
  playTone(440, 0.08, 0.1);
}

function stopListening() {
  state.recognition?.stop();
  stopMicStream();
  setMode('idle');
  playTone(330, 0.08, 0.1);

  // End session
  if (state.sessionId) {
    fetch(`${API}/api/voice/session/${state.sessionId}/end`, { method: 'POST', headers: headers() }).catch(() => {});
    state.sessionId = null;
  }
}

function stopSpeaking() {
  window.speechSynthesis?.cancel();
  state.audioQueue = [];
  state.isPlaying = false;
  const audio = document.querySelector('audio.tts-audio');
  if (audio) { audio.pause(); audio.remove(); }
  setMode('listening');
  state.recognition?.start();
}

function stopMicStream() {
  state.micStream?.getTracks().forEach(t => t.stop());
  state.micStream = null;
}

// ═══════════════════════════════════════════════════
// SEND MESSAGE & GET AI RESPONSE
// ═══════════════════════════════════════════════════
async function sendVoiceMessage(text) {
  state.recognition?.stop();
  addMessage('user', text);
  setMode('thinking');
  setStatus('Thinking...');

  try {
    // Create conversation if needed
    if (!state.conversationId) {
      const r = await fetch(`${API}/api/conversations`, {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ agent_id: state.currentAgent?.id, title: 'Voice Chat' })
      });
      const d = await r.json();
      state.conversationId = d.id;
    }

    // Send to chat API
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST', headers: headers(),
      body: JSON.stringify({
        message: text,
        conversation_id: state.conversationId,
        agent_id: state.currentAgent?.id,
      })
    });
    const d = await r.json();
    const reply = d.text || d.response || d.content || 'I could not generate a response.';

    addMessage('assistant', reply, state.currentAgent?.name);
    setMode('speaking');
    setStatus('Speaking...');

    // Track exchange
    if (state.sessionId) {
      fetch(`${API}/api/voice/session/${state.sessionId}/exchange`, {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ stt_text: text, tts_text: reply })
      }).catch(() => {});
    }

    // Speak the response
    await speakText(reply);

  } catch (e) {
    console.error('Chat error:', e);
    setMode('error');
    setStatus('Connection error — tap to retry');
  }
}

// ═══════════════════════════════════════════════════
// TTS — Premium or Browser Fallback
// ═══════════════════════════════════════════════════
async function speakText(text) {
  // Split into sentences for chunked playback
  const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];

  for (const sentence of sentences) {
    if (state.mode !== 'speaking') break;
    const trimmed = sentence.trim();
    if (!trimmed) continue;

    try {
      // Try premium TTS via agent voice or user settings
      const agentId = state.currentAgent?.id;
      let url = `${API}/api/voice/synthesize`;
      let body = { text: trimmed };

      if (agentId) {
        url = `${API}/api/voice/synthesize/agent/${agentId}`;
        body = { text: trimmed };
      }

      const r = await fetch(url, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
      const d = await r.json();

      if (d.audio && d.provider !== 'browser') {
        // Play premium audio
        await playAudioBase64(d.audio, d.mime || 'audio/mpeg');
      } else {
        // Browser fallback
        await browserSpeak(trimmed);
      }
    } catch (e) {
      await browserSpeak(trimmed);
    }
  }

  // Done speaking — resume listening
  if (state.mode === 'speaking') {
    setMode('listening');
    setStatus('Listening...');
    try { state.recognition?.start(); } catch (e) {}
  }
}

function playAudioBase64(b64, mime) {
  return new Promise((resolve) => {
    const audio = new Audio(`data:${mime};base64,${b64}`);
    audio.className = 'tts-audio';
    audio.onended = () => { audio.remove(); resolve(); };
    audio.onerror = () => { audio.remove(); resolve(); };

    // Visualize audio output
    if (state.audioCtx) {
      const source = state.audioCtx.createMediaElementSource(audio);
      const analyser = state.audioCtx.createAnalyser();
      analyser.fftSize = 64;
      source.connect(analyser);
      analyser.connect(state.audioCtx.destination);
      animateOutputViz(analyser);
    }
    audio.play().catch(() => resolve());
  });
}

function browserSpeak(text) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = parseFloat(state.settings.tts_speed || 1.0);
    utter.lang = state.settings.stt_language || 'en-US';
    utter.onend = resolve;
    utter.onerror = resolve;

    // Try to match a nice voice
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Samantha'));
    if (preferred) utter.voice = preferred;

    speechSynthesis.speak(utter);

    // Fake visualization for browser TTS
    fakeOutputViz(text.length * 40);
  });
}

// ═══════════════════════════════════════════════════
// VISUALIZATION
// ═══════════════════════════════════════════════════
function animateViz() {
  if (!state.analyser || state.mode === 'idle') return;
  const data = new Uint8Array(state.analyser.frequencyBinCount);
  state.analyser.getByteFrequencyData(data);

  state.vizBars.forEach((bar, i) => {
    const val = data[i] || 0;
    const h = Math.max(4, (val / 255) * 50);
    bar.style.height = h + 'px';
  });
  requestAnimationFrame(animateViz);
}

function animateOutputViz(analyser) {
  if (state.mode !== 'speaking') return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  state.vizBars.forEach((bar, i) => {
    const val = data[i] || 0;
    bar.style.height = Math.max(4, (val / 255) * 50) + 'px';
  });
  requestAnimationFrame(() => animateOutputViz(analyser));
}

function fakeOutputViz(duration) {
  const start = Date.now();
  function frame() {
    if (Date.now() - start > duration || state.mode !== 'speaking') {
      state.vizBars.forEach(b => b.style.height = '4px');
      return;
    }
    state.vizBars.forEach(bar => {
      bar.style.height = Math.max(4, Math.random() * 35 + 5) + 'px';
    });
    requestAnimationFrame(frame);
  }
  frame();
}

// ═══════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════
function setMode(mode) {
  state.mode = mode;
  app.className = 'app ' + (mode === 'error' ? 'error-state' : mode);

  const icon = $('orbIcon');
  if (mode === 'listening') {
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9a1 1 0 01-1-1v-2h2v2a1 1 0 01-1 1z"/></svg>';
    setStatus('Listening...');
  } else if (mode === 'thinking') {
    icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
  } else if (mode === 'speaking') {
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>';
  } else if (mode === 'idle') {
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9a1 1 0 01-1-1v-2h2v2a1 1 0 01-1 1z"/></svg>';
    setStatus('Tap the orb to start');
    state.vizBars.forEach(b => b.style.height = '4px');
  } else {
    icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>';
  }
}

function setStatus(text) { $('statusText').textContent = text; }

function addMessage(role, text, agentName) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'assistant' && agentName) {
    el.innerHTML = `<div class="agent-tag">${agentName}</div>${escapeHtml(text)}`;
  } else {
    el.textContent = text;
  }
  $('transcriptInner').appendChild(el);
  $('transcript').scrollTop = $('transcript').scrollHeight;
}

let partialEl = null;
function updatePartialTranscript(text) {
  if (!partialEl) {
    partialEl = document.createElement('div');
    partialEl.className = 'msg user partial';
    $('transcriptInner').appendChild(partialEl);
  }
  partialEl.textContent = text;
  $('transcript').scrollTop = $('transcript').scrollHeight;
}
function removePartialTranscript() {
  partialEl?.remove();
  partialEl = null;
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function playTone(freq, dur, vol) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.value = vol;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) {}
}

// ═══════════════════════════════════════════════════
// AGENT CHANGE
// ═══════════════════════════════════════════════════
function onAgentChange() {
  const id = $('agentSelect').value;
  state.currentAgent = state.agents.find(a => a.id === id) || null;
  state.conversationId = null; // New conversation per agent
  $('transcriptInner').innerHTML = '';
  updateVoiceLabel();
}

async function updateVoiceLabel() {
  if (!state.currentAgent) { $('voiceLabel').textContent = 'No Agent'; return; }
  try {
    const r = await fetch(`${API}/api/agents/${state.currentAgent.id}/voice`, { headers: headers() });
    const d = await r.json();
    const provider = d.voice_provider || 'browser';
    const voiceName = d.voice_id || 'default';
    $('voiceLabel').textContent = provider === 'browser' ? 'Browser TTS'
      : `${provider} / ${voiceName}`;
  } catch (e) { $('voiceLabel').textContent = 'Browser TTS'; }
}

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
function toggleSettings() {
  const panel = $('settingsPanel');
  const backdrop = $('backdrop');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  backdrop.classList.toggle('show');
  if (!isOpen) loadSettingsUI();
}

function populateProviderSettings() {
  const sel = $('settingsProvider');
  sel.innerHTML = '';
  state.providers.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.display_name + (p.configured ? '' : ' (not configured)');
    opt.disabled = !p.configured && p.id !== 'browser';
    sel.appendChild(opt);
  });
}

function onProviderChange() {
  const pid = $('settingsProvider').value;
  const provider = state.providers.find(p => p.id === pid);
  const voiceSel = $('settingsVoice');
  voiceSel.innerHTML = '';

  if (provider?.voices?.length) {
    provider.voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.name} — ${v.style || v.gender}`;
      voiceSel.appendChild(opt);
    });
  } else {
    const opt = document.createElement('option');
    opt.value = 'default';
    opt.textContent = 'System Default';
    voiceSel.appendChild(opt);
  }

  // Save
  saveSettings();
}

function loadSettingsUI() {
  $('settingsProvider').value = state.settings.tts_provider || 'browser';
  $('settingsSpeed').value = state.settings.tts_speed || 1;
  $('speedLabel').textContent = ($('settingsSpeed').value) + 'x';
  $('settingsLang').value = state.settings.stt_language || 'en-US';
  $('settingsSilence').value = state.settings.silence_threshold || 1500;
  $('silenceLabel').textContent = (($('settingsSilence').value) / 1000) + 's';
  onProviderChange();
}

async function saveSettings() {
  state.settings = {
    ...state.settings,
    tts_provider: $('settingsProvider').value,
    tts_voice: $('settingsVoice').value,
    tts_speed: parseFloat($('settingsSpeed').value),
    stt_language: $('settingsLang').value,
    silence_threshold: parseInt($('settingsSilence').value),
  };
  try {
    await fetch(`${API}/api/voice/settings`, {
      method: 'PUT', headers: headers(), body: JSON.stringify(state.settings)
    });
  } catch (e) {}
}

// Save on any settings change
['settingsProvider','settingsVoice','settingsSpeed','settingsLang','settingsSilence'].forEach(id => {
  $(id)?.addEventListener('change', saveSettings);
});
</script>
