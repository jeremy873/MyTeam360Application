<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — MyTeam360</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pl:#A459F2;--pd:#5B21B6;--bg:#0B0B14;--card:rgba(17,17,30,0.7);--brd:rgba(255,255,255,0.06);--tx:#94A3B8;--w:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;overflow:hidden}
.aurora{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(124,58,237,0.2),rgba(59,130,246,0.08),transparent 70%);filter:blur(60px);pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--brd);border-radius:18px;padding:2.5rem;width:90%;max-width:400px}
.logo-row{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;justify-content:center}
.logo-row span{font-family:'Sora',sans-serif;font-weight:700;font-size:1.15rem;color:var(--w)}
h1{font-family:'Sora',sans-serif;font-size:1.4rem;color:var(--w);text-align:center;margin-bottom:0.4rem;font-weight:700}
.sub{text-align:center;font-size:0.85rem;color:var(--tx);margin-bottom:2rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--tx);margin-bottom:0.3rem}
.field input{width:100%;padding:0.6rem 0.85rem;background:rgba(255,255,255,0.04);border:1px solid var(--brd);border-radius:10px;color:var(--w);font-size:0.88rem;outline:none;transition:0.2s;font-family:inherit}
.field input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
.field input::placeholder{color:rgba(148,163,184,0.5)}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;font-size:0.78rem}
.row label{display:flex;align-items:center;gap:0.3rem;cursor:pointer;color:var(--tx)}
.row label input{accent-color:var(--p)}
.row a{color:var(--pl);font-weight:500;text-decoration:none}.row a:hover{text-decoration:underline}
.btn-login{width:100%;padding:0.7rem;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:0.2s;font-family:'Plus Jakarta Sans',sans-serif}
.btn-login:hover{background:var(--pd)}
.divider{display:flex;align-items:center;gap:0.8rem;margin:1.5rem 0;font-size:0.72rem;color:rgba(148,163,184,0.4)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.social-row{display:flex;gap:0.5rem;margin-bottom:1.5rem}
.social-btn{flex:1;padding:0.55rem;background:rgba(255,255,255,0.04);border:1px solid var(--brd);border-radius:10px;color:var(--tx);font-size:0.8rem;font-weight:500;cursor:pointer;transition:0.2s;font-family:inherit;text-align:center}
.social-btn:hover{border-color:rgba(255,255,255,0.12);color:var(--w);background:rgba(255,255,255,0.06)}
.footer-text{text-align:center;font-size:0.8rem;color:var(--tx)}
.footer-text a{color:var(--pl);font-weight:600;text-decoration:none}.footer-text a:hover{text-decoration:underline}
.voice-hint{text-align:center;margin-top:1.2rem;padding:0.6rem;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.1);border-radius:10px;font-size:0.75rem;color:var(--pl)}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="login-card">
  <div class="logo-row">
    <span>MyTeam360</span>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account to continue</p>

  <form action="/auth/login" method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="jeremy@myteam360.ai" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="row">
      <label><input type="checkbox" name="remember"> Remember me</label>
      <a href="/auth/reset">Forgot password?</a>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>

  <div class="divider">or continue with</div>
  <div class="social-row">
    <button class="social-btn" onclick="location.href='/auth/google'">Google</button>
    <button class="social-btn" onclick="location.href='/auth/microsoft'">Microsoft</button>
  </div>
  <p class="footer-text">Don't have an account? <a href="/auth/register">Sign up</a></p>
  <div class="voice-hint">🎙 Pro tip: After login, say "set up my business" to get started in 30 seconds</div>
</div>
</body>
</html>
